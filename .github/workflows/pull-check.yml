name: Verify trmnlp pull is clean

on:
  workflow_dispatch:

concurrency:
  group: trmnlp-sync
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  pull-check:
    name: Pull upstream and open/update sync PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SYNC_BRANCH: chore/trmnlp-upstream-sync
      BASE_BRANCH: ${{ github.event.repository.default_branch }}
      PR_TITLE: "chore: sync plugin files from trmnlp pull"
      REPO: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Install trmnlp
        run: |
          set -euo pipefail
          gem install trmnl_preview

      - name: Configure trmnlp
        run: |
          set -euo pipefail
          mkdir -p ~/.config/trmnlp
          cat > ~/.config/trmnlp/config.yml << EOF
          ---
          api_key: ${{ secrets.TRMNL_API_KEY }}
          EOF

      - name: Run trmnlp pull
        run: |
          set -euo pipefail
          trmnlp pull --force

      - name: Detect repository changes
        id: changes
        run: |
          set -euo pipefail
          git add -N .

          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Detected file changes after trmnlp pull."
            git status --short
            git --no-pager diff

            echo "### Changes detected" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`diff" >> "$GITHUB_STEP_SUMMARY"
            git --no-pager diff >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No file changes detected after trmnlp pull."

            echo "### No changes detected" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit and push sync branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -B "$SYNC_BRANCH"
          git add -A

          if ! git diff --cached --quiet; then
            git commit -m "$PR_TITLE"
          else
            echo "No staged changes to commit."
          fi

          git push --force-with-lease --set-upstream origin "$SYNC_BRANCH"

      - name: Ensure sync PR exists
        if: steps.changes.outputs.changed == 'true'
        id: pr
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const [owner, repo] = process.env.REPO.split('/');
            const head = `${owner}:${process.env.SYNC_BRANCH}`;
            const base = process.env.BASE_BRANCH;
            const title = process.env.PR_TITLE;

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              base,
              per_page: 1,
            });

            if (pulls.length > 0) {
              core.setOutput('action', 'updated');
              core.setOutput('number', String(pulls[0].number));
              return;
            }

            const body = [
              'Automated update generated by `trmnlp pull --force`.',
              '',
              '- Trigger: manual workflow dispatch',
              '- Behavior: branch is force-pushed when upstream changes exist',
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: process.env.SYNC_BRANCH,
              base,
              body,
            });

            core.setOutput('action', 'created');
            core.setOutput('number', String(pr.number));

      - name: Fail if PR creation blocked
        if: steps.changes.outputs.changed == 'true' && steps.pr.outcome == 'failure'
        run: |
          echo "Branch $SYNC_BRANCH was updated, but PR creation is blocked."
          echo "Enable 'Allow GitHub Actions to create pull requests' or provide a token with proper permissions."
          exit 1

      - name: Report result
        if: steps.changes.outputs.changed == 'true'
        run: |
          if [ "${{ steps.pr.outputs.action }}" = "updated" ]; then
            echo "Updated existing PR #${{ steps.pr.outputs.number }}"
            echo "### PR Updated: #${{ steps.pr.outputs.number }}" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.pr.outputs.action }}" = "created" ]; then
            echo "Created PR #${{ steps.pr.outputs.number }}"
            echo "### PR Created: #${{ steps.pr.outputs.number }}" >> "$GITHUB_STEP_SUMMARY"
          fi
